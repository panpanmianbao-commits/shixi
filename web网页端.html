function togglePlayPause() {
    if (!isRunning) {
        if (currentMode === 'pomodoro') {
            resetPomodoroState();
            startPomodoroPhase();
            return;
        }
        const input = document.getElementById("timeInput").value;
        const seconds = parseTime(input);
        if (!seconds || seconds <= 0) {
            alert("请输入有效时间，如: 5min, 10min, 30s, 2h");
            return;
        }
        totalSeconds = seconds;
        remainingSeconds = seconds;
        frameIndex = 0;
        isRunning = true;
        isPaused = false;
        prevTimeDigits = [];
        document.getElementById("doneMessage").classList.add("hidden");
        updatePlayPauseButton('pause');
        startThemeEffects();
        autoPlayMusic();
        document.getElementById("stopBtn").disabled = false;
        document.querySelectorAll(".theme-btn").forEach(btn => btn.style.pointerEvents = "none");
        timerInterval = setInterval(tick, 1000);
        updateDisplay();
    } else if (isPaused) {
        isPaused = false;
        if (audioPlayer && !isMusicPlaying) { audioPlayer.play().catch(()=>{}); }
        updatePlayPauseButton('pause');
        startThemeEffects();
        document.getElementById("stopBtn").disabled = false;
        timerInterval = setInterval(tick, 1000);
        updateDisplay();
    } else {
        isPaused = true;
        clearInterval(timerInterval);
        stopThemeEffects();
        if (audioPlayer && isMusicPlaying) { audioPlayer.pause(); }
        updatePlayPauseButton('resume');
    }
}

function updatePlayPauseButton(state) {
    const btn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const text = document.getElementById('playPauseText');
    if (state === 'pause') {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        text.textContent = '暂停';
        btn.classList.remove('primary');
        btn.classList.add('secondary');
    } else if (state === 'resume') {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        text.textContent = '继续';
        btn.classList.remove('secondary');
        btn.classList.add('primary');
    } else {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        text.textContent = '开始';
        btn.classList.remove('secondary');
        btn.classList.add('primary');
    }
}

function stopTimer() {
    if (!isRunning) return;
    stopThemeEffects();
    if (currentTheme === "sakura" && remainingSeconds > 0 && remainingSeconds < totalSeconds) {
        petalFallEffect();
        setTimeout(() => { resetTimerState(); }, 2000);
        return;
    }
    resetTimerState();
}

function resetTimerState() {
    autoPauseMusic();
    clearInterval(timerInterval);
    isRunning = false;
    isPaused = false;
    remainingSeconds = 0;
    frameIndex = 0;
    prevTimeDigits = [];
    stopThemeEffects();
    updatePlayPauseButton('start');
    document.getElementById("stopBtn").disabled = true;
    document.querySelectorAll(".theme-btn").forEach(btn => btn.style.pointerEvents = "auto");
    document.getElementById("doneMessage").classList.add("hidden");
    // 清除番茄钟主题类，让 updateDisplay 重新设置正确的主题
    document.getElementById('countdownDisplay').classList.remove('pomodoro-work', 'pomodoro-break');
    updateDisplay();
}

function tick() {
    if (isPaused) return;
    remainingSeconds--;
    frameIndex++;
    if (remainingSeconds <= 0) {
        if (currentMode === 'pomodoro') {
            completePomodoroPhase();
        } else {
            completeTimer();
        }
        return;
    }
    if (currentTheme === 'cook') updateFeastProgress();
    updateDisplay();
}

function completeTimer() {
    clearInterval(timerInterval);
    remainingSeconds = 0;
    isRunning = false;
    stopThemeEffects();
    const theme = themes[currentTheme];
    renderTimeDisplay(0);
    document.getElementById("frameDisplay").innerHTML = '<span class="frame-svg-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.4 7.4L12 16.8l-6.4 4.6 2.4-7.4-6-4.6h7.6L12 2z"/></svg></span>';
    document.getElementById("statusDisplay").textContent = "";
    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressText").textContent = "100.0%";
    const doneMsg = document.getElementById("doneMessage");
    doneMsg.textContent = theme.doneMsg;
    doneMsg.classList.remove("hidden");
    updatePlayPauseButton('start');
    document.getElementById("stopBtn").disabled = true;
    document.querySelectorAll(".theme-btn").forEach(btn => btn.style.pointerEvents = "auto");
    checkAchievements();
    if (currentTheme === "autumn" && totalSeconds >= 1500) { autumnLeaves++; updateLeavesDisplay(); }
}

function checkAchievements() {
    const unlocked = [];
    if (!achievements.first_timer.unlocked) { achievements.first_timer.unlocked = true; unlocked.push("初次计时"); }
    if (totalSeconds >= 300 && !achievements.five_minutes.unlocked) { achievements.five_minutes.unlocked = true; unlocked.push("专注五分钟"); }
    if (totalSeconds >= 600 && !achievements.ten_minutes.unlocked) { achievements.ten_minutes.unlocked = true; unlocked.push("深度专注"); }
    if (totalSeconds >= 3600 && !achievements.one_hour.unlocked) { achievements.one_hour.unlocked = true; unlocked.push("持久战士"); }
    if (!achievements.custom_master.unlocked) { achievements.custom_master.unlocked = true; unlocked.push("自定义大师"); }
    usedThemes.add(currentTheme);
    if (usedThemes.size >= 3 && !achievements.theme_explorer.unlocked) { achievements.theme_explorer.unlocked = true; unlocked.push("主题探索者"); }
    if (currentMode === 'pomodoro' && !achievements.pomodoro_master.unlocked) { achievements.pomodoro_master.unlocked = true; unlocked.push("番茄钟达人"); }
    if (pomoCurrentCycle >= 4 && currentMode === 'pomodoro' && !achievements.pomodoro_pro.unlocked) { achievements.pomodoro_pro.unlocked = true; unlocked.push("番茄钟专家"); }
    renderAchievements();
    if (unlocked.length > 0) {
        setTimeout(() => { alert("新成就解锁！\n\n" + unlocked.map(a => "「" + a + "」").join("\n")); }, 500);
    }
}

function renderAchievements() {
    const list = document.getElementById("achievementList");
    list.innerHTML = "";
    let unlockedCount = 0;
    let totalCount = 0;
    for (const [key, ach] of Object.entries(achievements)) {
        totalCount++;
        if (ach.unlocked) unlockedCount++;
        const item = document.createElement("div");
        item.className = "achievement-item" + (ach.unlocked ? " unlocked" : "");
        item.innerHTML = `<span class="achievement-icon">${ach.unlocked ? '<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="#52c41a"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" fill="#bbb"/></svg>'}</span><span class="achievement-name">${ach.name}</span><span class="achievement-desc">${ach.desc}</span><span class="achievement-status ${ach.unlocked ? "unlocked" : "locked"}">${ach.unlocked ? "已解锁" : "未解锁"}</span>`;
        list.appendChild(item);
    }
    const badge = document.getElementById('achBadge');
    if (badge) {
        badge.textContent = unlockedCount + '/' + totalCount;
        if (unlockedCount > 0) badge.classList.add('has-unlocked');
    }
}

function updateLeavesDisplay() {
    document.getElementById("leavesCount").textContent = autumnLeaves;
    const pct = Math.min((autumnLeaves / 30) * 100, 100);
    document.getElementById("leavesProgressBar").style.width = pct + "%";
    if (autumnLeaves >= 30) document.getElementById("leavesPanel").style.background = "rgba(82, 196, 26, 0.15)";
}

initThemes();
renderAchievements();
prevTimeDigits = [];
updateDisplay();


// ===== 头像上传系统 =====
let tempAvatarData = null;
let currentAvatarFor = 'register'; // 'register' or 'profile'

function handleAvatarSelect(input, forMode) {
    const file = input.files[0];
    if (!file) return;

    const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    if (!allowedTypes.includes(file.type)) {
        showCropError('请上传 JPG / PNG / GIF / WebP 格式的图片');
        return;
    }

    const maxSize = 2 * 1024 * 1024;
    if (file.size > maxSize) {
        showCropError('图片大小不能超过 2MB');
        return;
    }

    currentAvatarFor = forMode;

    const reader = new FileReader();
    reader.onload = function(e) {
        tempAvatarData = e.target.result;
        showAvatarCrop(tempAvatarData);
    };
    reader.readAsDataURL(file);
    input.value = '';
}

function showAvatarCrop(dataUrl) {
    const overlay = document.getElementById('avatarCropOverlay');
    const img = document.getElementById('cropPreviewImg');
    img.src = dataUrl;
    document.getElementById('cropError').textContent = '';
    overlay.classList.add('show');
}

function closeAvatarCrop() {
    document.getElementById('avatarCropOverlay').classList.remove('show');
    tempAvatarData = null;
    setTimeout(() => {
        document.getElementById('cropPreviewImg').src = '';
    }, 300);
}

function confirmAvatarCrop() {
    if (!tempAvatarData) return;

    if (currentAvatarFor === 'register') {
        const preview = document.getElementById('regAvatarPreview');
        const img = document.getElementById('regAvatarImg');
        const placeholder = document.getElementById('regAvatarPlaceholder');
        img.src = tempAvatarData;
        img.style.display = 'block';
        placeholder.style.display = 'none';
        preview.style.borderColor = '#1a1a1a';
    } else if (currentAvatarFor === 'profile') {
        // 更新当前用户头像
        if (currentUser) {
            currentUser.avatar = tempAvatarData;
            localStorage.setItem('shixi_user', JSON.stringify(currentUser));
            // 同步更新用户列表中的头像
            const users = JSON.parse(localStorage.getItem('shixi_users') || '[]');
            const idx = users.findIndex(u => u.username === currentUser.username);
            if (idx >= 0) {
                users[idx].avatar = tempAvatarData;
                localStorage.setItem('shixi_users', JSON.stringify(users));
            }
            updateUserUI();
            const doneMsg = document.getElementById('doneMessage');
            doneMsg.textContent = '头像更换成功！';
            doneMsg.classList.remove('hidden');
            setTimeout(() => doneMsg.classList.add('hidden'), 2000);
        }
    }

    closeAvatarCrop();
}

function showCropError(msg) {
    const errorEl = document.getElementById('cropError');
    if (errorEl) errorEl.textContent = msg;
    setTimeout(() => { if (errorEl) errorEl.textContent = ''; }, 3000);
}

function getRegAvatarData() {
    const img = document.getElementById('regAvatarImg');
    if (img && img.style.display !== 'none' && img.src) {
        return img.src;
    }
    return null;
}

function clearRegAvatar() {
    const img = document.getElementById('regAvatarImg');
    const placeholder = document.getElementById('regAvatarPlaceholder');
    const preview = document.getElementById('regAvatarPreview');
    if (img) { img.src = ''; img.style.display = 'none'; }
    if (placeholder) placeholder.style.display = 'flex';
    if (preview) preview.style.borderColor = '#e5e5e5';
}

function changeAvatar() {
    document.getElementById('userDropdown').classList.remove('show');
    document.getElementById('changeAvatarInput').click();
}

// ===== 账号系统 =====
let currentUser = null;

function initAuth() {
    const saved = localStorage.getItem('shixi_user');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            updateUserUI();
        } catch(e) {
            localStorage.removeItem('shixi_user');
        }
    }
    document.addEventListener('click', function(e) {
        const wrap = document.getElementById('userAvatarWrap');
        const dropdown = document.getElementById('userDropdown');
        if (wrap && dropdown && !wrap.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
}

function toggleUserDropdown() {
    const dropdown = document.getElementById('userDropdown');
    dropdown.classList.toggle('show');
}

function openAuthModal(mode) {
    document.getElementById('userDropdown').classList.remove('show');
    document.getElementById('authModal').classList.add('show');
    switchAuthMode(mode);
    document.getElementById('loginError').textContent = '';
    document.getElementById('regError').textContent = '';
}

function closeAuthModal() {
    document.getElementById('authModal').classList.remove('show');
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('regUsername').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regPassword2').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('regError').textContent = '';
    clearRegAvatar();
    closeAvatarCrop();
}

function switchAuthMode(mode) {
    if (mode === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }
}

function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');

    if (!username) { errorEl.textContent = '请输入用户名'; return; }
    if (!password) { errorEl.textContent = '请输入密码'; return; }

    const users = JSON.parse(localStorage.getItem('shixi_users') || '[]');
    const user = users.find(u => u.username === username && u.password === password);

    if (!user) {
        errorEl.textContent = '用户名或密码错误';
        return;
    }

    currentUser = { username: user.username, email: user.email, avatar: user.avatar };
    localStorage.setItem('shixi_user', JSON.stringify(currentUser));
    updateUserUI();
    closeAuthModal();
    const doneMsg = document.getElementById('doneMessage');
    doneMsg.textContent = '「' + username + '」欢迎回来！';
    doneMsg.classList.remove('hidden');
    setTimeout(() => doneMsg.classList.add('hidden'), 3000);
}

function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const password2 = document.getElementById('regPassword2').value;
    const errorEl = document.getElementById('regError');

    if (!username || username.length < 2 || username.length > 16) {
        errorEl.textContent = '用户名需2-16个字符'; return;
    }
    if (password.length < 6) {
        errorEl.textContent = '密码至少6位'; return;
    }
    if (password !== password2) {
        errorEl.textContent = '两次密码不一致'; return;
    }

    const users = JSON.parse(localStorage.getItem('shixi_users') || '[]');
    if (users.find(u => u.username === username)) {
        errorEl.textContent = '用户名已被注册'; return;
    }

    const avatarData = getRegAvatarData();

    const newUser = {
        username: username,
        email: email || '',
        password: password,
        avatar: avatarData || '',
        createdAt: new Date().toISOString()
    };
    users.push(newUser);
    localStorage.setItem('shixi_users', JSON.stringify(users));

    currentUser = { username: username, email: email, avatar: avatarData || '' };
    localStorage.setItem('shixi_user', JSON.stringify(currentUser));
    updateUserUI();
    closeAuthModal();
    clearRegAvatar();

    const doneMsg = document.getElementById('doneMessage');
    doneMsg.textContent = '注册成功！欢迎加入「时隙」';
    doneMsg.classList.remove('hidden');
    setTimeout(() => doneMsg.classList.add('hidden'), 3000);
}

function logout() {
    currentUser = null;
    localStorage.removeItem('shixi_user');
    updateUserUI();
    document.getElementById('userDropdown').classList.remove('show');

    const doneMsg = document.getElementById('doneMessage');
    doneMsg.textContent = '已退出登录';
    doneMsg.classList.remove('hidden');
    setTimeout(() => doneMsg.classList.add('hidden'), 2000);
}

function updateUserUI() {
    const placeholder = document.getElementById('avatarPlaceholder');
    const img = document.getElementById('avatarImg');
    const userInfo = document.getElementById('dropdownUserInfo');
    const usernameEl = document.getElementById('dropdownUsername');
    const emailEl = document.getElementById('dropdownEmail');
    const loginBtn = document.getElementById('dropdownLoginBtn');
    const regBtn = document.getElementById('dropdownRegisterBtn');
    const divider = document.getElementById('dropdownDivider');
    const changeAvatarBtn = document.getElementById('dropdownChangeAvatarBtn');
    const logoutBtn = document.getElementById('dropdownLogoutBtn');

    if (currentUser) {
        placeholder.style.display = 'none';
        if (currentUser.avatar && currentUser.avatar.startsWith('data:')) {
            img.src = currentUser.avatar;
            img.style.display = 'block';
        } else if (currentUser.avatar) {
            img.src = currentUser.avatar;
            img.style.display = 'block';
        } else {
            const canvas = document.createElement('canvas');
            canvas.width = 80; canvas.height = 80;
            const ctx = canvas.getContext('2d');
            const colors = ['#1a1a1a','#333','#555','#666','#888','#999'];
            ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
            ctx.fillRect(0,0,80,80);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px "Noto Serif SC", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentUser.username.charAt(0).toUpperCase(), 40, 42);
            img.src = canvas.toDataURL();
            img.style.display = 'block';
        }
        userInfo.style.display = 'block';
        usernameEl.textContent = currentUser.username;
        emailEl.textContent = currentUser.email || '未设置邮箱';
        loginBtn.style.display = 'none';
        regBtn.style.display = 'none';
        divider.style.display = 'block';
        changeAvatarBtn.style.display = 'flex';
        logoutBtn.style.display = 'flex';
    } else {
        placeholder.style.display = 'flex';
        img.style.display = 'none';
        img.src = '';
        userInfo.style.display = 'none';
        usernameEl.textContent = '未登录';
        emailEl.textContent = '';
        loginBtn.style.display = 'flex';
        regBtn.style.display = 'flex';
        divider.style.display = 'none';
        changeAvatarBtn.style.display = 'none';
        logoutBtn.style.display = 'none';
    }
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeAuthModal();
        closeAvatarCrop();
    }
});

initAuth();

</script>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div id="loginForm">
                <div class="modal-title">欢迎回来</div>
                <div class="modal-form-group">
                    <label class="modal-label">用户名</label>
                    <input type="text" class="modal-input" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">密码</label>
                    <input type="password" class="modal-input" id="loginPassword" placeholder="请输入密码">
                </div>
                <div class="modal-error" id="loginError"></div>
                <button class="modal-btn" onclick="handleLogin()">登录</button>
                <div class="modal-switch">
                    还没有账号？<a onclick="switchAuthMode('register')">立即注册</a>
                </div>
            </div>

                <div class="avatar-upload-wrap">

                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <img id="regAvatarImg" src="" alt="头像预览" style="display:none;">
                    </div>
                    <button class="avatar-upload-btn" onclick="document.getElementById('regAvatarInput').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        上传头像
                    </button>
                    <input type="file" class="avatar-upload-input" id="regAvatarInput" accept="image/*" onchange="handleAvatarSelect(this, 'register')">
                    <div class="avatar-upload-hint">支持 JPG / PNG / GIF，建议正方形</div>
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">用户名</label>
                    <input type="text" class="modal-input" id="regUsername" placeholder="设置用户名（2-16字符）">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">邮箱（可选）</label>
                    <input type="email" class="modal-input" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">密码</label>
                    <input type="password" class="modal-input" id="regPassword" placeholder="至少6位字符">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">确认密码</label>
                    <input type="password" class="modal-input" id="regPassword2" placeholder="再次输入密码">
                </div>
                <div class="modal-error" id="regError"></div>
                <button class="modal-btn" onclick="handleRegister()">注册</button>
                <div class="modal-switch">
                    已有账号？<a onclick="switchAuthMode('login')">直接登录</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 头像裁剪弹窗 -->
    <div class="avatar-crop-overlay" id="avatarCropOverlay">
        <div class="avatar-crop-box">
            <div class="avatar-crop-title">调整头像</div>
            <div class="avatar-crop-preview-wrap" id="cropPreviewWrap">
                <img id="cropPreviewImg" src="" alt="裁剪预览">
            </div>
            <div class="avatar-crop-error" id="cropError"></div>
            <div class="avatar-crop-controls">
                <button class="avatar-crop-btn cancel" onclick="closeAvatarCrop()">取消</button>
                <button class="avatar-crop-btn confirm" onclick="confirmAvatarCrop()">确认使用</button>
            </div>
        </div>
    </div>
