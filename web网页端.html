<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时隙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'EB Garamond', 'Georgia', 'SimSun', serif;
            background: #f5f5f5;
            padding: 24px 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            padding: 32px 28px;
        }

        /* ===== 头部 ===== */
        .timer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px;
            margin-bottom: 24px;
            gap: 16px;
        }
        .timer-header .header-text {
            flex: 1;
            min-width: 0;
        }
        .timer-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: 4px;
            line-height: 1.2;
        }

        /* ===== 用户头像 ===== */
        .user-avatar-wrap {
            position: relative;
            flex-shrink: 0;
            margin-right: 4px;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2.5px solid #f0f0f0;
            background: #f8f8f8;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-avatar:hover {
            border-color: #1a1a1a;
            transform: scale(1.06);
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .user-avatar .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }
        .user-avatar .avatar-placeholder svg {
            width: 22px;
            height: 22px;
        }

        /* ===== 用户下拉菜单 ===== */
        .user-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            min-width: 200px;
            padding: 8px 0;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.95);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: top right;
        }
        .user-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .dropdown-user-info {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 4px;
        }
        .dropdown-username {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dropdown-email {
            font-size: 11px;
            color: #bbb;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.15s ease-out;
            font-family: 'Noto Serif SC', serif;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover {
            background: #f5f5f5;
            color: #1a1a1a;
        }
        .dropdown-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: #888;
        }
        .dropdown-item:hover svg {
            color: #1a1a1a;
        }
        .dropdown-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 4px 0;
        }

        /* ===== 账号弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-out;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 380px;
            padding: 28px 24px;
            transform: translateY(12px) scale(0.97);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-box {
            transform: translateY(0) scale(1);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }
        .modal-form-group {
            margin-bottom: 14px;
        }
        .modal-label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .modal-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            color: #1a1a1a;
            background: transparent;
            outline: none;
            transition: all 0.2s ease-out;
        }
        .modal-input:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26,26,26,0.08);
        }
        .modal-input::placeholder {
            color: #bbb;
            font-style: italic;
        }
        .modal-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .modal-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,26,26,0.2);
        }
        .modal-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        .modal-switch {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #888;
        }
        .modal-switch a {
            color: #1a1a1a;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .modal-switch a:hover {
            border-bottom-color: #1a1a1a;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: all 0.2s ease-out;
        }
        .modal-close:hover {
            background: #eee;
            color: #1a1a1a;
        }
        .modal-close svg {
            width: 16px;
            height: 16px;
        }
        .modal-error {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 6px;
            text-align: center;
            min-height: 18px;
        }
        .modal-success {
            font-size: 12px;
            color: #52c41a;
            margin-top: 6px;
            text-align: center;
            min-height: 18px;
        }

        /* ===== 头像上传 ===== */
        .avatar-upload-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .avatar-upload-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #e5e5e5;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease-out;
        }
        .avatar-upload-preview:hover {
            border-color: #1a1a1a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .avatar-upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar-upload-preview .upload-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
        }
        .avatar-upload-preview .upload-placeholder svg {
            width: 28px;
            height: 28px;
        }
        .avatar-upload-btn {
            padding: 6px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            color: #666;
            transition: all 0.2s ease-out;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .avatar-upload-btn:hover {
            border-color: #1a1a1a;
            background: #f5f5f5;
            transform: translateY(-1px);
        }
        .avatar-upload-btn svg {
            width: 14px;
            height: 14px;
        }
        .avatar-upload-hint {
            font-size: 11px;
            color: #bbb;
            text-align: center;
        }
        .avatar-upload-input {
            display: none;
        }
        /* 头像裁剪遮罩 */
        .avatar-crop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-out;
        }
        .avatar-crop-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .avatar-crop-box {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            text-align: center;
            transform: translateY(12px) scale(0.97);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .avatar-crop-overlay.show .avatar-crop-box {
            transform: translateY(0) scale(1);
        }
        .avatar-crop-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .avatar-crop-preview-wrap {
            width: 200px;
            height: 200px;
            margin: 0 auto 16px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #e5e5e5;
            background: #f5f5f5;
            position: relative;
        }
        .avatar-crop-preview-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar-crop-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .avatar-crop-btn {
            padding: 8px 18px;
            border: 1.5px solid transparent;
            border-radius: 8px;
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .avatar-crop-btn.confirm {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        .avatar-crop-btn.confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,26,26,0.2);
        }
        .avatar-crop-btn.cancel {
            background: #f5f5f5;
            color: #666;
            border-color: #e5e5e5;
        }
        .avatar-crop-btn.cancel:hover {
            background: #fff;
            border-color: #bbb;
        }
        .avatar-crop-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        .avatar-crop-error {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ===== 模式切换 ===== */
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease-out;
        }
        .mode-btn:hover { border-color: #bbb; background: #f5f5f5; }
        .mode-btn.active {
            border-color: #1a1a1a;
            background: #1a1a1a;
            color: #fff;
            font-weight: 600;
        }
        .mode-btn svg { flex-shrink: 0; width: 16px; height: 16px; }

        /* ===== 输入区域 ===== */
        .time-input-section {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        .time-input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            color: #1a1a1a;
            background: transparent;
            outline: none;
            transition: all 0.2s ease-out;
        }
        .time-input:focus { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }
        .time-input::placeholder { color: #bbb; font-style: italic; }
        .preset-btns { display: flex; gap: 6px; }
        .preset-btn {
            padding: 8px 12px;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            color: #666;
            transition: all 0.2s ease-out;
        }
        .preset-btn:hover { border-color: #bbb; background: #f5f5f5; transform: translateY(-1px); }

        /* ===== 番茄钟设置 ===== */
        .pomodoro-settings {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pomo-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .pomo-field { flex: 1; }
        .pomo-label {
            display: block;
            font-size: 11px;
            color: #bbb;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .pomo-input-wrap {
            display: flex;
            align-items: center;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s ease-out;
        }
        .pomo-input-wrap:focus-within { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }
        .pomo-input {
            flex: 1;
            border: none;
            padding: 8px 10px;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            background: transparent;
            outline: none;
            text-align: center;
            width: 100%;
            -moz-appearance: textfield;
        }
        .pomo-input::-webkit-outer-spin-button,
        .pomo-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .pomo-unit {
            font-size: 12px;
            color: #bbb;
            padding-right: 10px;
            white-space: nowrap;
        }
        .pomo-presets { display: flex; gap: 6px; flex-wrap: wrap; }
        .pomo-preset {
            padding: 6px 12px;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            color: #666;
            transition: all 0.2s ease-out;
        }
        .pomo-preset:hover { border-color: #1a1a1a; background: #f5f5f5; transform: translateY(-1px); }

        /* ===== 倒计时显示 ===== */
        .countdown-display {
            text-align: center;
            padding: 20px 16px;
            border: 1.5px solid #e5e5e5;
            border-radius: 12px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease-out;
            min-height: 180px;
        }
        /* ===== 主题配色系统 ===== */
        .countdown-display {
            --theme-color: #1a1a1a;
            --theme-bg: #fff;
            --theme-border: #e5e5e5;
            --theme-muted: #888;
            --theme-accent: #1a1a1a;
            transition: background 0.4s ease-out, border-color 0.4s ease-out;
        }
        .countdown-display .theme-name { color: var(--theme-muted); transition: color 0.3s ease-out; }
        .countdown-display .time-display { color: var(--theme-color); transition: color 0.3s ease-out; }
        .countdown-display .frame-display { color: var(--theme-accent); transition: color 0.3s ease-out; }
        .countdown-display .status-display { color: var(--theme-muted); transition: color 0.3s ease-out; }
        .countdown-display .progress-text { color: var(--theme-muted); transition: color 0.3s ease-out; }
        .countdown-display .progress-container { background: var(--theme-bg); transition: background 0.3s ease-out; }

        /* 小蜜蜂 */
        .countdown-display.bee-theme {
            background: #fffbeb;
            border-color: #f5deb3;
            --theme-color: #5c4033;
            --theme-bg: #fef3c7;
            --theme-border: #f5deb3;
            --theme-muted: #a08060;
            --theme-accent: #b8860b;
        }
        /* 火箭发射 */
        .countdown-display.rocket-theme {
            background: #f0f7ff;
            border-color: #bfdbfe;
            --theme-color: #1e3a5f;
            --theme-bg: #dbeafe;
            --theme-border: #bfdbfe;
            --theme-muted: #6b8cae;
            --theme-accent: #2563eb;
        }
        /* 小猫钓鱼 */
        .countdown-display.fish-theme {
            background: #f0f9ff;
            border-color: #bae6fd;
            --theme-color: #0c4a6e;
            --theme-bg: #e0f2fe;
            --theme-border: #bae6fd;
            --theme-muted: #5a8faa;
            --theme-accent: #0284c7;
        }
        /* 大厨烹饪 */
        .countdown-display.cook-theme {
            background: #fff5f5;
            border-color: #fecaca;
            --theme-color: #5c1a1a;
            --theme-bg: #fee2e2;
            --theme-border: #fecaca;
            --theme-muted: #b07070;
            --theme-accent: #c0392b;
        }
        /* 樱花进度条 */
        .countdown-display.sakura-theme {
            background: #fff0f3;
            border-color: #ffd1dc;
            --theme-color: #7b1e4a;
            --theme-bg: #fce7f3;
            --theme-border: #ffd1dc;
            --theme-muted: #b0708a;
            --theme-accent: #db2777;
        }
        /* 梅雨の窓 */
        .countdown-display.rainy-theme {
            background: #f0f4f8;
            border-color: #c5d3e0;
            --theme-color: #2c3e50;
            --theme-bg: #e2e8f0;
            --theme-border: #c5d3e0;
            --theme-muted: #7a8fa5;
            --theme-accent: #4a6fa5;
        }
        /* 红叶の便り */
        .countdown-display.autumn-theme {
            background: #fff8f0;
            border-color: #ffd8a8;
            --theme-color: #7c2d12;
            --theme-bg: #ffedd5;
            --theme-border: #ffd8a8;
            --theme-muted: #b08060;
            --theme-accent: #d35400;
        }
        /* 雪の積もる音 */
        .countdown-display.winter-theme {
            background: #f8fafc;
            border-color: #d1d5db;
            --theme-color: #334155;
            --theme-bg: #e2e8f0;
            --theme-border: #d1d5db;
            --theme-muted: #8896aa;
            --theme-accent: #475569;
        }
        /* 番茄钟 · 专注 */
        .countdown-display.pomodoro-work {
            background: #fff8f0;
            border-color: #ffd8a8;
            --theme-color: #7c2d12;
            --theme-bg: #ffedd5;
            --theme-border: #ffd8a8;
            --theme-muted: #b08060;
            --theme-accent: #d35400;
        }
        /* 番茄钟 · 休息 */
        .countdown-display.pomodoro-break {
            background: #f0fdf4;
            border-color: #bbf7d0;
            --theme-color: #14532d;
            --theme-bg: #dcfce7;
            --theme-border: #bbf7d0;
            --theme-muted: #5a8a6a;
            --theme-accent: #15803d;
        }
        .countdown-display.running .time-display { animation: breathe 2s ease-in-out infinite; }

        /* ===== 数字高斯模糊动画 ===== */
        .digit-slot {
            display: inline-block;
            position: relative;
            width: 0.6em;
            height: 1.1em;
            overflow: hidden;
            vertical-align: bottom;
        }
        .digit-slot .digit-current,
        .digit-slot .digit-next {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            text-align: center;
        }
        .digit-slot .digit-current {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1);
        }
        .digit-slot .digit-next {
            opacity: 0;
            filter: blur(10px);
            transform: scale(0.85);
        }
        .digit-slot.flipping .digit-current {
            animation: digit-blur-out 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .digit-slot.flipping .digit-next {
            animation: digit-blur-in 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.08s forwards;
        }
        @keyframes digit-blur-out {
            0%   { opacity: 1; filter: blur(0px); transform: scale(1); }
            30%  { opacity: 0.6; filter: blur(4px); transform: scale(1.03); }
            100% { opacity: 0; filter: blur(16px); transform: scale(0.8); }
        }
        @keyframes digit-blur-in {
            0%   { opacity: 0; filter: blur(16px); transform: scale(0.8); }
            40%  { opacity: 0.5; filter: blur(6px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }
        .digit-separator { display: inline-block; width: 0.3em; text-align: center; }

        /* ===== 主题动画 ===== */
        @keyframes sakura-fall {
            0% { transform: translateY(-20px) translateX(0) rotate(0deg) scale(1); opacity: 0.85; }
            15% { transform: translateY(20px) translateX(18px) rotate(55deg) scale(0.95); }
            30% { transform: translateY(50px) translateX(-8px) rotate(120deg) scale(1); }
            45% { transform: translateY(80px) translateX(22px) rotate(200deg) scale(0.9); }
            60% { transform: translateY(110px) translateX(-5px) rotate(280deg) scale(0.95); }
            75% { transform: translateY(140px) translateX(15px) rotate(330deg) scale(0.85); }
            100% { transform: translateY(200px) translateX(0) rotate(420deg) scale(0.7); opacity: 0; }
        }
        .sakura-petal {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            animation: sakura-fall 3.5s ease-in-out forwards;

        .sakura-petal svg { display: block; }
        .sakura-petal.small { animation-duration: 2.8s; opacity: 0.6; }

        .sakura-petal.xlarge { animation-duration: 4.5s; }

        @keyframes rain-drop {

        .rain-drop {
            position: absolute;
            width: 2px;
            height: 12px;
            background: linear-gradient(to bottom, rgba(176,196,222,0.8), rgba(176,196,222,0.2));
            border-radius: 2px;
            pointer-events: none;
            z-index: 0;
            animation: rain-drop 1.2s ease-in forwards;
        }
        .rain-drop.heavy {
            width: 3px;
            height: 18px;
            background: linear-gradient(to bottom, rgba(100,149,237,0.9), rgba(100,149,237,0.2));
        }

        @keyframes snow-fall {
            0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 1; }
            25% { transform: translateY(40px) translateX(10px) rotate(45deg); }
            50% { transform: translateY(90px) translateX(-8px) rotate(90deg); }
            75% { transform: translateY(140px) translateX(15px) rotate(135deg); }
            100% { transform: translateY(200px) translateX(5px) rotate(180deg); opacity: 0; }
        }
        .snowflake {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            z-index: 0;

        }
        .snowflake.small { font-size: 9px; opacity: 0.5; }
        .snowflake.large { font-size: 20px; }

        @keyframes leaf-fall {
            0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 1; }
            20% { transform: translateY(30px) translateX(20px) rotate(45deg); }
            40% { transform: translateY(60px) translateX(-10px) rotate(90deg); }
            60% { transform: translateY(100px) translateX(25px) rotate(135deg); }
            80% { transform: translateY(140px) translateX(-5px) rotate(180deg); }
            100% { transform: translateY(200px) translateX(10px) rotate(225deg); opacity: 0; }
        }
        .autumn-leaf {
            position: absolute;
            font-size: 16px;
            pointer-events: none;
            z-index: 0;
            animation: leaf-fall 3.5s ease-in forwards;
        }

        @keyframes bee-fly {
            0% { transform: translate(-30px, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            25% { transform: translate(50px, -20px) rotate(15deg); }
            50% { transform: translate(120px, 10px) rotate(-10deg); }
            75% { transform: translate(200px, -15px) rotate(20deg); }
            90% { opacity: 1; }
            100% { transform: translate(280px, 5px) rotate(0deg); opacity: 0; }

        .bee-fly {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: bee-fly 2.5s ease-in-out forwards;

        @keyframes rocket-launch {

            100% { transform: translateY(-30px) scale(1); opacity: 0; }
        }
        .rocket-launch {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            z-index: 0;
            animation: rocket-launch 2s ease-out forwards;
        }

        @keyframes fish-swim {
            0% { transform: translateX(-40px) scaleX(1); opacity: 0; }
            10% { opacity: 1; }
            45% { transform: translateX(120px) scaleX(1); }
            50% { transform: translateX(120px) scaleX(-1); }
            90% { opacity: 1; }
            100% { transform: translateX(-40px) scaleX(-1); opacity: 0; }
        }
        .fish-swim {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: fish-swim 4s ease-in-out forwards;
        }

        @keyframes steam-rise {
            0% { transform: translateY(60px) scale(0.5); opacity: 0; }
            20% { opacity: 0.6; }
            50% { transform: translateY(20px) translateX(10px) scale(0.8); opacity: 0.4; }
            100% { transform: translateY(-20px) translateX(-5px) scale(1); opacity: 0; }
        }
        .steam-rise {
            position: absolute;
            font-size: 18px;
            pointer-events: none;
            z-index: 0;
            animation: steam-rise 2.5s ease-out forwards;
        }

        /* ===== 大厨盛宴场景 ===== */
        .feast-scene {
            position: absolute;
            bottom: 42px;
            left: 0;

        .feast-scene svg { overflow: visible; }

        @keyframes steam-wisp {

        .feast-steam {
            animation: steam-wisp 2.5s ease-out infinite;

/* ===== 灵动图标动画系统 ===== */

/* 基础：所有图标悬停时的弹性过渡 */
.mode-btn svg,
.theme-btn .theme-icon svg,
.music-icon svg,
.music-toggle svg,
.station-btn svg,
.auto-toggle svg,
.ctrl-btn svg,
.collapse-icon svg,
.achievement-icon svg,
.frame-svg-icon svg,
.pomo-preset svg,
.preset-btn svg {
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center;
}

/* 模式按钮图标 - 轻摆 */
.mode-btn:hover svg {
    animation: iconWiggle 0.5s ease-in-out;
}
@keyframes iconWiggle {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-8deg) scale(1.1); }
    50% { transform: rotate(6deg) scale(1.05); }
    75% { transform: rotate(-3deg) scale(1.08); }
}

/* 主题按钮图标 - 各自有性格 */
.theme-btn:hover .theme-icon svg {
    animation: iconBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* 蜜蜂 - 翅膀扇动 */
.theme-btn[data-theme="bee"]:hover .theme-icon svg,
#countdownDisplay[data-theme="bee"] .frame-svg-icon:hover svg {
    animation: beeFlutter 0.4s ease-in-out 2;
}
@keyframes beeFlutter {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-3px) rotate(-5deg); }
    50% { transform: translateY(0) rotate(0deg); }
    75% { transform: translateY(-2px) rotate(5deg); }
}

/* 火箭 - 发射抖动 */
.theme-btn[data-theme="rocket"]:hover .theme-icon svg,
#countdownDisplay[data-theme="rocket"] .frame-svg-icon:hover svg {
    animation: rocketShake 0.5s ease-in-out;
}
@keyframes rocketShake {
    0% { transform: translateY(0) rotate(0deg); }
    20% { transform: translateY(-2px) rotate(-3deg); }
    40% { transform: translateY(-4px) rotate(3deg); }
    60% { transform: translateY(-2px) rotate(-2deg); }
    80% { transform: translateY(-1px) rotate(1deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

/* 鱼 - 游动摆尾 */
.theme-btn[data-theme="fish"]:hover .theme-icon svg,
#countdownDisplay[data-theme="fish"] .frame-svg-icon:hover svg {
    animation: fishWiggle 0.6s ease-in-out;
}
@keyframes fishWiggle {
    0%, 100% { transform: rotate(0deg) scaleX(1); }
    25% { transform: rotate(-8deg) scaleX(1.05); }
    50% { transform: rotate(6deg) scaleX(1); }
    75% { transform: rotate(-4deg) scaleX(1.03); }
}

/* 烹饪 - 锅铲翻炒 */
.theme-btn[data-theme="cook"]:hover .theme-icon svg,
#countdownDisplay[data-theme="cook"] .frame-svg-icon:hover svg {
    animation: cookFlip 0.5s ease-in-out;
}
@keyframes cookFlip {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(-15deg) translateY(-2px); }
    60% { transform: rotate(10deg) translateY(0); }
}

/* 樱花 - 花瓣飘落旋转 */
.theme-btn[data-theme="sakura"]:hover .theme-icon svg,
#countdownDisplay[data-theme="sakura"] .frame-svg-icon:hover svg {
    animation: sakuraSpin 0.8s ease-in-out;
}
@keyframes sakuraSpin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.15); }
    100% { transform: rotate(360deg) scale(1); }
}

/* 雨天 - 雨滴弹跳 */
.theme-btn[data-theme="rainy"]:hover .theme-icon svg,
#countdownDisplay[data-theme="rainy"] .frame-svg-icon:hover svg {
    animation: rainBounce 0.5s ease-in-out;
}
@keyframes rainBounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(4px); }
    50% { transform: translateY(-2px); }
    70% { transform: translateY(2px); }
}

/* 秋叶 - 飘落摇摆 */
.theme-btn[data-theme="autumn"]:hover .theme-icon svg,
#countdownDisplay[data-theme="autumn"] .frame-svg-icon:hover svg {
    animation: leafDrift 0.7s ease-in-out;
}
@keyframes leafDrift {
    0% { transform: rotate(0deg) translateX(0); }
    33% { transform: rotate(-10deg) translateX(-3px); }
    66% { transform: rotate(8deg) translateX(2px); }
    100% { transform: rotate(0deg) translateX(0); }
}

/* 冬雪 - 雪花结晶闪烁 */
.theme-btn[data-theme="winter"]:hover .theme-icon svg,
#countdownDisplay[data-theme="winter"] .frame-svg-icon:hover svg {
    animation: snowTwinkle 0.6s ease-in-out;
}
@keyframes snowTwinkle {
    0%, 100% { transform: rotate(0deg) scale(1); opacity: 1; }
    25% { transform: rotate(45deg) scale(1.2); opacity: 0.8; }
    50% { transform: rotate(90deg) scale(1); opacity: 1; }
    75% { transform: rotate(135deg) scale(1.1); opacity: 0.9; }
}

/* 通用弹性动画 */
@keyframes iconBounce {
    0%, 100% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(1.15) rotate(-5deg); }
    50% { transform: scale(0.95) rotate(3deg); }
    70% { transform: scale(1.08) rotate(-2deg); }
}

/* 音乐图标 - 音符跳动 */
.music-panel:hover .music-icon svg {
    animation: musicPulse 0.6s ease-in-out;
}
@keyframes musicPulse {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.15) rotate(-5deg); }
    50% { transform: scale(0.95) rotate(3deg); }
    75% { transform: scale(1.08) rotate(-2deg); }
}

/* 音乐播放/暂停按钮 - 呼吸 */
.music-toggle:hover svg {
    animation: breatheBtn 0.5s ease-in-out;
}
@keyframes breatheBtn {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* 电台切换按钮 - 轻旋 */
.station-btn:hover svg {
    animation: navSpin 0.4s ease-in-out;
}
@keyframes navSpin {
    0% { transform: translateX(0); }
    50% { transform: translateX(var(--dir, 3px)); }
    100% { transform: translateX(0); }
}
.station-btn:first-child:hover svg { --dir: -3px; }
.station-btn:last-child:hover svg { --dir: 3px; }

/* 自动轮播按钮 - 旋转 */
.auto-toggle:hover svg {
    animation: gearSpin 0.6s ease-in-out;
}
@keyframes gearSpin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
}

/* 控制按钮 - 主按钮脉冲 */
.ctrl-btn.primary:hover svg {
    animation: playPulse 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes playPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.2) rotate(-5deg); }
    70% { transform: scale(0.95) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); }
}

/* 停止按钮 - 震动 */
.ctrl-btn.secondary:hover svg {
    animation: stopShake 0.4s ease-in-out;
}
@keyframes stopShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-2px) rotate(-2deg); }
    40% { transform: translateX(2px) rotate(2deg); }
    60% { transform: translateX(-1px) rotate(-1deg); }
    80% { transform: translateX(1px) rotate(1deg); }
}

/* 折叠菜单图标 - 展开感 */
.collapse-header:hover .collapse-icon svg {
    animation: unfoldPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes unfoldPop {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.25) rotate(-10deg); }
    100% { transform: scale(1) rotate(0deg); }
}

/* 折叠箭头 - 翻转 */
.collapse-header:hover .collapse-arrow svg {
    animation: arrowFlip 0.4s ease-in-out;
}
@keyframes arrowFlip {
    0% { transform: translateY(0); }
    50% { transform: translateY(3px); }
    100% { transform: translateY(0); }
}

/* 成就图标 - 解锁闪烁 */
.achievement-item:hover .achievement-icon svg {
    animation: trophyShine 0.5s ease-in-out;
}
@keyframes trophyShine {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
}

/* 预设按钮图标 - 轻弹 */
.pomo-preset:hover svg,
.preset-btn:hover svg {
    animation: presetFlick 0.4s ease-in-out;
}
@keyframes presetFlick {
    0% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3px) scale(1.1); }
    100% { transform: translateY(0) scale(1); }
}

/* 音量图标 - 声波扩散 */
.music-volume:hover svg {
    animation: soundWave 0.6s ease-in-out;
}
@keyframes soundWave {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.2); }
    50% { transform: scale(0.9); }
    75% { transform: scale(1.1); }
}

/* 进度条区域图标 - 呼吸 */
.frame-display:hover .frame-svg-icon svg {
    animation: frameBreathe 0.8s ease-in-out infinite;
}
@keyframes frameBreathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

/* 番茄钟状态徽章图标 - 跳动 */
.pomo-phase-badge:hover svg {
    animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes badgePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* 头部标题装饰 - 轻微摇摆 */
.timer-header:hover h2::after {
    animation: headerWink 0.5s ease-in-out;
}
@keyframes headerWink {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(5deg); }
}

/* 响应式：减少动画强度 */
@media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}



/* ===== 时钟指针点击转动动画 ===== */
.clock-hand {
    transform-origin: 12px 12px;
    transition: transform 0.3s ease;
}

/* 点击瞬间：指针快速转一圈，带过冲弹性 */
.mode-btn:active .clock-hand {
    animation: clockSpin 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes clockSpin {
    0%   { transform: rotate(0deg); }
    70%  { transform: rotate(400deg); }
    100% { transform: rotate(360deg); }
}

/* 当前激活模式的图标，指针做微妙的呼吸摆动（像真正在走时） */
.mode-btn.active .clock-hand {
    animation: clockBreath 3s ease-in-out infinite;
}

@keyframes clockBreath {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(2deg); }
    75% { transform: rotate(-1deg); }
}

/* 切换模式时的指针飞转（通过JS添加 .switching 类触发） */
.mode-btn.switching .clock-hand {
    animation: clockSwitch 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes clockSwitch {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(180deg) scale(1.15); }
    60%  { transform: rotate(360deg) scale(0.95); }
    80%  { transform: rotate(390deg) scale(1.05); }
    100% { transform: rotate(360deg) scale(1); }
}

</style>

<script>
// ===== Lo-Fi 音乐播放器 =====
const LOFI_STREAMS = [
    { name: "CNR 经典音乐广播", url: "http://ngcdn004.cnr.cn/live/dszs/index.m3u8", logo: "https://bkimg.cdn.bcebos.com/pic/0d338744ebf81a4c510f51c2d72a6059242da6cc?x-bce-process=image/format,f_auto" },
    { name: "上海经典947", url: "http://lhttp.qingting.fm/live/267/64k.mp3", logo: "https://kimi-web-img.moonshot.cn/img/zuiai.tv/70795526641bf4e70006b97567ea6860234e6e2b.jpg" },
    { name: "河南古典音乐·天籁", url: "http://stream.hndt.com/live/gudian/playlist.m3u8", logo: "https://kimi-web-img.moonshot.cn/img/www.hndt.com/771db5450ad7ebc94fd99b50b4d5a1e123b5fbde.png" },
    { name: "河南网络广播·民谣", url: "http://stream3.hndt.com/now/DTK5qc83/playlist.m3u8", logo: "https://bkimg.cdn.bcebos.com/pic/0d338744ebf81a4c510f51c2d72a6059242da6cc?x-bce-process=image/format,f_auto" },
    { name: "河南网络广播·天籁古典", url: "http://stream3.hndt.com/now/MdOpB4zP/playlist.m3u8", logo: "https://kimi-web-img.moonshot.cn/img/www.hndt.com/771db5450ad7ebc94fd99b50b4d5a1e123b5fbde.png" },
    { name: "Asia FM 亚洲经典台", url: "https://lhttp.qingting.fm/live/5021912/64k.mp3", logo: "https://kimi-web-img.moonshot.cn/img/pic.qtfm.cn/a76c82c374aedade54f0eb2ef7c2719d9a72e944.jpeg!200" },
    { name: "CRI 怀旧金曲频道", url: "https://lhttp.qingting.fm/live/5022038/64k.mp3", logo: "https://kimi-web-img.moonshot.cn/img/static2.mytuner.mobi/3f384d201e36069234208e993865b421b897c7b9.jpg" },
    { name: "清晨音乐台", url: "http://lhttp.qingting.fm/live/4915/64k.mp3", logo: "https://kimi-web-img.moonshot.cn/img/pic.qtfm.cn/b4361ad4606ed67da516c34daa5e8ec9467dc9fc.jpeg!200" }
];

let audioPlayer = null;
let currentStreamIndex = 0;
let isMusicPlaying = false;
let musicAutoStarted = false;
let autoSwitchEnabled = false;  // 默认关闭自动轮播
let manualSwitchCount = 0;

function initAudio() {
    if (!audioPlayer) {
        audioPlayer = new Audio();
        audioPlayer.crossOrigin = "anonymous";
        audioPlayer.volume = 0.4;
        audioPlayer.preload = "none";
        audioPlayer.addEventListener('playing', () => {
            isMusicPlaying = true;
            updateMusicUI(true);
        });
        audioPlayer.addEventListener('pause', () => {
            isMusicPlaying = false;
            updateMusicUI(false);
        });
        audioPlayer.addEventListener('ended', () => {
            if (autoSwitchEnabled) switchStream();
        });
        audioPlayer.addEventListener('error', (e) => {
            console.warn('音频流错误，尝试切换:', e);
            if (autoSwitchEnabled) setTimeout(() => switchStream(), 500);
        });
    }
}

function toggleMusic() {
    initAudio();
    if (isMusicPlaying) {
        audioPlayer.pause();
        isMusicPlaying = false;
        updateMusicUI(false);
    } else {
        loadStream(currentStreamIndex);
    }
}

function loadStream(index) {
    if (!audioPlayer) initAudio();
    const stream = LOFI_STREAMS[index];
    audioPlayer.src = stream.url;
    audioPlayer.load();
    const playPromise = audioPlayer.play();
    if (playPromise !== undefined) {
        playPromise.catch(err => {
            console.warn('播放失败:', err);
            if (autoSwitchEnabled) setTimeout(() => switchStream(), 500);
        });
    }
    document.getElementById('musicTitle').textContent = stream.name;
    document.getElementById('stationIndex').textContent = (index + 1) + ' / ' + LOFI_STREAMS.length;
    updateStationLogo(stream.logo);
}

function updateStationLogo(logoUrl) {
    const logoImg = document.getElementById('musicLogo');
    const iconDiv = document.getElementById('musicIcon');
    if (logoUrl) {
        logoImg.src = logoUrl;
        logoImg.style.display = 'block';
        iconDiv.style.display = 'none';
    } else {
        logoImg.style.display = 'none';
        iconDiv.style.display = 'flex';
    }
}

function prevStation() {
    manualSwitchCount++;
    currentStreamIndex = (currentStreamIndex - 1 + LOFI_STREAMS.length) % LOFI_STREAMS.length;
    loadStream(currentStreamIndex);
}

function nextStation() {
    manualSwitchCount++;
    currentStreamIndex = (currentStreamIndex + 1) % LOFI_STREAMS.length;
    loadStream(currentStreamIndex);
}

function toggleAutoSwitch() {
    autoSwitchEnabled = !autoSwitchEnabled;
    const toggle = document.getElementById('autoToggle');
    const label = document.getElementById('autoLabel');
    if (autoSwitchEnabled) {
        toggle.classList.remove('off');
        label.textContent = '自动轮播: 开';
        label.style.color = '#888';
    } else {
        toggle.classList.add('off');
        label.textContent = '自动轮播: 关';
        label.style.color = '#bbb';
    }
}

function switchStream() {
    if (!autoSwitchEnabled) return;
    currentStreamIndex = (currentStreamIndex + 1) % LOFI_STREAMS.length;
    loadStream(currentStreamIndex);
}

function setVolume(val) {
    const vol = val / 100;
    if (audioPlayer) audioPlayer.volume = vol;
    document.getElementById('volumeValue').textContent = val + '%';
}

function updateMusicUI(playing) {
    const panel = document.getElementById('musicPanel');
    const toggle = document.getElementById('musicToggle');
    const status = document.getElementById('musicStatus');
    const icon = document.getElementById('musicIcon');
    if (playing) {
        panel.classList.add('playing');
        toggle.classList.add('playing');
        toggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><rect x="9" y="8.5" width="1.5" height="7" fill="currentColor"/><rect x="13.5" y="8.5" width="1.5" height="7" fill="currentColor"/></svg>`;
        status.textContent = '正在播放: ' + LOFI_STREAMS[currentStreamIndex].name;
    } else {
        panel.classList.remove('playing');
        toggle.classList.remove('playing');
        toggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M7.76253 3.10547C8.25778 3.10552 8.74424 3.23849 9.17073 3.49023L19.533 9.60742C20.8536 10.3869 21.2923 12.0901 20.5174 13.4121C20.2785 13.8195 19.9398 14.1604 19.533 14.4004L9.16975 20.5156C7.84722 21.2958 6.14596 20.8511 5.36995 19.5273C5.11962 19.1003 4.9872 18.6142 4.98714 18.1191V5.88672C4.98717 4.3537 6.22731 3.10547 7.76253 3.10547Z" fill="currentColor"/></svg>`;
        status.textContent = '已暂停';
    }
}

function autoPlayMusic() {
    if (!musicAutoStarted && !isMusicPlaying) {
        musicAutoStarted = true;
        initAudio();
        loadStream(currentStreamIndex);
    }
}

function autoPauseMusic() {
    if (audioPlayer && isMusicPlaying) {
        audioPlayer.pause();
        isMusicPlaying = false;
        updateMusicUI(false);
    }
}

let currentMode = 'normal';
let pomoPhase = 'work';
let pomoCurrentCycle = 0;
let pomoTotalCycles = 4;
let pomoWorkSeconds = 25 * 60;
let pomoBreakSeconds = 5 * 60;
let pomoAutoStartBreak = true;

const pomoThemes = {
    work: {
        frames: ["专注开始...","进入心流","保持专注...","深度工作中","思绪泉涌...","全神贯注","保持节奏...","即将完成"],

function switchMode(mode) {
    if (isRunning) stopTimer();
    currentMode = mode;
    const normalBtn = document.getElementById('modeNormal');
    const pomoBtn = document.getElementById('modePomodoro');

    // 触发指针飞转动画
    [normalBtn, pomoBtn].forEach(btn => {
        btn.classList.remove('switching');
        void btn.offsetWidth; // 强制重排，允许重新触发动画
        btn.classList.add('switching');
        setTimeout(() => btn.classList.remove('switching'), 900);
    });

    normalBtn.classList.toggle('active', mode === 'normal');
    pomoBtn.classList.toggle('active', mode === 'pomodoro');
    document.getElementById('normalInputSection').classList.toggle('hidden', mode === 'pomodoro');
    document.getElementById('pomodoroSettings').classList.toggle('hidden', mode === 'normal');
    document.getElementById('pomodoroStatusBar').classList.toggle('hidden', mode === 'normal');
    if (mode === 'pomodoro') {
        resetPomodoroState();
        document.getElementById('themeName').textContent = '番茄钟模式';
        document.getElementById('frameDisplay').innerHTML = '<span class="frame-svg-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></span>';
        document.getElementById('statusDisplay').textContent = '设置好专注和休息时间，点击开始';
        renderPomoDots();
    } else {
        resetPomodoroState();
        const theme = themes[currentTheme];
        document.getElementById('themeName').textContent = theme.emoji + ' ' + theme.name;
        document.getElementById('frameDisplay').textContent = theme.emoji;
        document.getElementById('statusDisplay').textContent = '准备开始...';
    }
    updateDisplay();
}

function setPomodoroPreset(work, brk, cycles) {
    if (isRunning) return;
    document.getElementById('pomoWork').value = work;
    document.getElementById('pomoBreak').value = brk;
    document.getElementById('pomoCycles').value = cycles;
}

function resetPomodoroState() {
    pomoPhase = 'work';
    pomoCurrentCycle = 0;
    pomoTotalCycles = parseInt(document.getElementById('pomoCycles').value) || 4;
    pomoWorkSeconds = (parseInt(document.getElementById('pomoWork').value) || 25) * 60;
    pomoBreakSeconds = (parseInt(document.getElementById('pomoBreak').value) || 5) * 60;
    const display = document.getElementById('countdownDisplay');
    display.classList.remove('pomodoro-work', 'pomodoro-break');
    document.getElementById('pomodoroStatusBar').classList.remove('work', 'break');
    renderPomoDots();
}

function renderPomoDots() {
    const track = document.getElementById('pomoCycleTrack');
    const text = document.getElementById('pomoCycleText');
    if (!track || currentMode !== 'pomodoro') return;
    let html = '';
    for (let i = 0; i < pomoTotalCycles; i++) {
        let cls = 'pomo-dot';
        if (i < pomoCurrentCycle) cls += ' done';
        else if (i === pomoCurrentCycle && isRunning) cls += ' active';
        html += `<div class="${cls}"></div>`;
    }
    track.innerHTML = html;
    text.textContent = `第 ${Math.min(pomoCurrentCycle + 1, pomoTotalCycles)} / ${pomoTotalCycles} 轮`;
}

function updatePomoStatusBar() {
    const bar = document.getElementById('pomodoroStatusBar');
    const badge = document.getElementById('pomoPhaseBadge');
    const display = document.getElementById('countdownDisplay');
    if (pomoPhase === 'work') {
        bar.classList.add('work');
        bar.classList.remove('break');
        display.classList.add('pomodoro-work');
        display.classList.remove('pomodoro-break');
        badge.textContent = '专注中'; badge.style.color = '#ff8c00';
    } else {
        bar.classList.add('break');
        bar.classList.remove('work');
        display.classList.add('pomodoro-break');
        display.classList.remove('pomodoro-work');
        badge.textContent = '休息中'; badge.style.color = '#52c41a';
    }
    renderPomoDots();
}

function startPomodoroPhase() {
    if (pomoPhase === 'work') {
        totalSeconds = pomoWorkSeconds;
        remainingSeconds = pomoWorkSeconds;
    } else {
        totalSeconds = pomoBreakSeconds;
        remainingSeconds = pomoBreakSeconds;
    }
    frameIndex = 0;
    isRunning = true;
    isPaused = false;
    prevTimeDigits = [];
    document.getElementById('doneMessage').classList.add('hidden');
    updatePlayPauseButton('pause');
    updatePomoStatusBar();
    startThemeEffects();
    autoPlayMusic();
    document.getElementById('stopBtn').disabled = false;
    document.querySelectorAll('.theme-btn').forEach(btn => btn.style.pointerEvents = 'none');
    timerInterval = setInterval(tick, 1000);
    updateDisplay();
}

function completePomodoroPhase() {
    clearInterval(timerInterval);
    isRunning = false;
    stopThemeEffects();
    renderTimeDisplay(0);
    document.getElementById("frameDisplay").innerHTML = '<span class="frame-svg-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.4 7.4L12 16.8l-6.4 4.6 2.4-7.4-6-4.6h7.6L12 2z"/></svg></span>';
    document.getElementById("statusDisplay").textContent = "";
    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressText").textContent = "100.0%";
    const doneMsg = document.getElementById("doneMessage");
    doneMsg.textContent = pomoThemes[pomoPhase].doneMsg;
    doneMsg.classList.remove("hidden");

    if (pomoPhase === 'work') pomoCurrentCycle++;

    if (pomoCurrentCycle >= pomoTotalCycles && pomoPhase === 'work') {
        setTimeout(() => {
            document.getElementById("frameDisplay").innerHTML = '<span class="frame-svg-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.4 7.4L12 16.8l-6.4 4.6 2.4-7.4-6-4.6h7.6L12 2z"/></svg></span>';
            document.getElementById('statusDisplay').textContent = '所有轮次已完成！太棒了！';
            doneMsg.textContent = "恭喜！全部 " + pomoTotalCycles + " 轮番茄钟已完成！";
        }, 1500);
        updatePlayPauseButton('start');
        document.getElementById("stopBtn").disabled = true;
        document.querySelectorAll(".theme-btn").forEach(btn => btn.style.pointerEvents = "auto");
        checkAchievements();
        return;
    }

    if (pomoPhase === 'work') {
        pomoPhase = 'break';
        setTimeout(() => {
            if (pomoAutoStartBreak) {
                doneMsg.classList.add('hidden');
                startPomodoroPhase();
            } else {
                updatePlayPauseButton('start');
                document.getElementById("stopBtn").disabled = false;
                document.querySelectorAll('.theme-btn').forEach(btn => btn.style.pointerEvents = 'auto');
                updatePomoStatusBar();
                updateDisplay();
            }
        }, 2000);
    } else {
        pomoPhase = 'work';
        setTimeout(() => {
            if (pomoAutoStartWork) {
                doneMsg.classList.add('hidden');
                startPomodoroPhase();
            } else {
                updatePlayPauseButton('start');
                document.getElementById("stopBtn").disabled = false;
                document.querySelectorAll('.theme-btn').forEach(btn => btn.style.pointerEvents = 'auto');
                updatePomoStatusBar();
                updateDisplay();
            }
        }, 2000);
    }
}

function initThemes() {
    const dailyContainer = document.getElementById("dailyThemes");
    const seasonContainer = document.getElementById("seasonThemes");
    for (const [key, theme] of Object.entries(themes)) {
        const btn = document.createElement("button");
        btn.className = "theme-btn" + (key === currentTheme ? " active" : "");
        btn.setAttribute("data-theme", key);
        btn.innerHTML = getThemeIconSVG(theme.icon) + "<span>" + theme.name + "</span>";
        btn.onclick = () => selectTheme(key);
        if (theme.group === "daily") dailyContainer.appendChild(btn);
        else seasonContainer.appendChild(btn);
    }
}

function toggleCollapse(contentId, headerBtn) {
    const content = document.getElementById(contentId);
    const arrow = headerBtn.querySelector('.collapse-arrow');
    const isExpanded = content.classList.contains('expanded');
    if (isExpanded) {
        content.classList.remove('expanded');
        arrow.classList.remove('rotated');
    } else {
        content.classList.add('expanded');
        arrow.classList.add('rotated');
    }
}

function selectTheme(key) {
    if (isRunning) return;
    currentTheme = key;
    document.querySelectorAll(".theme-btn").forEach(btn => {
        btn.classList.remove("active");
        if (btn.getAttribute("data-theme") === key) btn.classList.add("active");
    });
    updateDisplay();
}

function parseTime(str) {
    str = str.trim().toLowerCase();
    if (str.endsWith("min")) { const n = parseFloat(str.slice(0, -3)); return isNaN(n) ? null : Math.floor(n * 60); }
    if (str.endsWith("h")) { const n = parseFloat(str.slice(0, -1)); return isNaN(n) ? null : Math.floor(n * 3600); }
    if (str.endsWith("s")) { const n = parseFloat(str.slice(0, -1)); return isNaN(n) ? null : Math.floor(n); }
    const n = parseFloat(str);
    return isNaN(n) ? null : Math.floor(n);
}

function setTime(val) {
    if (isRunning) return;
    document.getElementById("timeInput").value = val;
}

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return [String(h).padStart(2,"0"), String(m).padStart(2,"0"), String(s).padStart(2,"0")];
    return [String(m).padStart(2,"0"), String(s).padStart(2,"0")];
}

function renderTimeDisplay(seconds) {
    const parts = formatTime(seconds);
    const display = document.getElementById("timeDisplay");
    if (prevTimeDigits.length === 0) {
        display.innerHTML = buildTimeHTML(parts, null);
        prevTimeDigits = parts.slice();
        return;
    }
    const prevParts = prevTimeDigits;
    const changedIndices = [];
    for (let p = 0; p < parts.length; p++) {
        for (let d = 0; d < 2; d++) {
            const prevChar = prevParts[p] ? prevParts[p][d] : '';
            const currChar = parts[p][d];
            if (prevChar !== currChar) {
                changedIndices.push({ partIdx: p, digitIdx: d, prev: prevChar, curr: currChar });
            }
        }
    }
    display.innerHTML = buildTimeHTML(parts, changedIndices);
    prevTimeDigits = parts.slice();
    requestAnimationFrame(() => {
        const slots = display.querySelectorAll('.digit-slot');
        changedIndices.forEach(info => {
            const slotIdx = info.partIdx * 2 + info.digitIdx;
            if (slots[slotIdx]) {
                slots[slotIdx].classList.remove('flipping');
                void slots[slotIdx].offsetWidth; // 强制重排，确保动画可重新触发
                slots[slotIdx].classList.add('flipping');
            }
        });
    });
}

function buildTimeHTML(parts, changedIndices) {
    let html = '';
    const changedSet = new Set();
    if (changedIndices) {
        changedIndices.forEach(info => {
            const globalIdx = info.partIdx * 2 + info.digitIdx;
            changedSet.add(globalIdx);
        });
    }
    let globalDigitIdx = 0;
    for (let p = 0; p < parts.length; p++) {
        if (p > 0) html += '<span class="digit-separator">:</span>';
        const part = parts[p];
        for (let d = 0; d < 2; d++) {
            const isChanged = changedSet.has(globalDigitIdx);
            if (isChanged && changedIndices) {
                const info = changedIndices.find(ci => ci.partIdx * 2 + ci.digitIdx === globalDigitIdx);
                html += `<span class="digit-slot"><span class="digit-current">${info.prev}</span><span class="digit-next">${info.curr}</span></span>`;
            } else {
                html += `<span class="digit-slot"><span class="digit-current">${part[d]}</span><span class="digit-next">${part[d]}</span></span>`;
            }
            globalDigitIdx++;
        }
    }
    return html;
}

function updateDisplay() {
    const display = document.getElementById("countdownDisplay");
    display.setAttribute("data-theme", currentTheme);
    display.classList.remove("bee-theme", "rocket-theme", "fish-theme", "cook-theme", "sakura-theme", "rainy-theme", "autumn-theme", "winter-theme", "pomodoro-work", "pomodoro-break", "running");
    if (currentMode !== 'pomodoro') display.classList.add(currentTheme + "-theme");
    if (isRunning && remainingSeconds > 0) display.classList.add("running");

    let theme, color;
    if (currentMode === 'pomodoro' && isRunning) {
        theme = pomoThemes[pomoPhase];
        color = pomoPhase === 'work' ? 'autumn' : 'bee';
        document.getElementById("themeName").textContent = "番茄钟 · " + (pomoPhase === 'work' ? "专注中" : "休息中");
    } else {
        theme = themes[currentTheme];
        color = theme.color;
        document.getElementById("themeName").textContent = theme.name;
    }

    renderTimeDisplay(remainingSeconds);
    const progress = totalSeconds > 0 ? (totalSeconds - remainingSeconds) / totalSeconds : 0;
    const bar = document.getElementById("progressBar");
    bar.style.width = (progress * 100) + "%";
    bar.className = "progress-bar " + color;
    document.getElementById("progressText").textContent = (progress * 100).toFixed(1) + "%";
    if (isRunning && remainingSeconds > 0) {
        const frameIdx = frameIndex % theme.frames.length;
        document.getElementById("frameDisplay").textContent = theme.frames[frameIdx];
        document.getElementById("statusDisplay").textContent = theme.statuses[frameIdx];
    } else if (!isRunning && remainingSeconds === 0 && totalSeconds > 0) {
        document.getElementById("frameDisplay").innerHTML = '<span class="frame-svg-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.4 7.4L12 16.8l-6.4 4.6 2.4-7.4-6-4.6h7.6L12 2z"/></svg></span>';
